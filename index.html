<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowers Management System</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">


    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#4ade80', /* Green-400 */
                        secondary: '#2dd4bf', /* Teal-400 */
                        tertiary: '#34d399', /* Emerald-400 */
                        dark: '#0f172a', /* Slate-900 */
                        appbg: '#f8fafc',
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(74,222,128,0.15)',
                        'softer': '0 4px 20px -5px rgba(74,222,128,0.1)',
                        'glow': '0 0 20px rgba(74,222,128,0.4)',
                        'glass': 'inset 0 2px 4px 0 rgba(255, 255, 255, 0.3)',
                    },
                    borderRadius: {
                        'xl': '16px',
                        '2xl': '24px',
                        '3xl': '32px',
                    },
                    animation: {
                        'gradient-x': 'gradient-x 3s ease infinite',
                        'float': 'float 3s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'spin-slow': 'spin 8s linear infinite',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': {
                                'background-size': '200% 200%',
                                'background-position': 'left center'
                            },
                            '50%': {
                                'background-size': '200% 200%',
                                'background-position': 'right center'
                            },
                        },
                        'float': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-5px)' },
                        },
                        'spin': {
                            'to': { transform: 'rotate(360deg)' },
                        },
                        'pulse': {
                            '50%': { opacity: '.5' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body
    class="bg-gradient-to-br from-green-50 via-emerald-50 to-teal-50 dark:from-slate-900 dark:via-green-900/20 dark:to-slate-900 font-sans tracking-tight text-gray-900 h-screen flex flex-col overflow-hidden dark:text-white transition-colors duration-500 relative">

    <!-- Animated Background Elements -->
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-green-400/20 dark:bg-green-600/20 rounded-full mix-blend-multiply dark:mix-blend-lighten filter blur-3xl opacity-70 animate-float"></div>
        <div class="absolute top-[20%] right-[-10%] w-96 h-96 bg-emerald-400/20 dark:bg-emerald-600/20 rounded-full mix-blend-multiply dark:mix-blend-lighten filter blur-3xl opacity-70 animate-float" style="animation-delay: 1s;"></div>
        <div class="absolute bottom-[-10%] left-[20%] w-96 h-96 bg-teal-400/20 dark:bg-teal-600/20 rounded-full mix-blend-multiply dark:mix-blend-lighten filter blur-3xl opacity-70 animate-float" style="animation-delay: 2s;"></div>
    </div>

    <!-- Auth Container -->
    <div id="auth-container"
        class="hidden absolute inset-0 z-50 bg-gradient-to-br from-green-50 via-emerald-50 to-teal-50 dark:from-slate-900 dark:via-green-900/40 dark:to-slate-900 transition-colors duration-500 flex flex-col px-4 sm:px-6 lg:px-8 items-center justify-center relative overflow-hidden">
        <!-- Auth Background Animations -->
        <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
            <div class="absolute top-[10%] left-[10%] w-72 h-72 bg-gradient-to-r from-green-400 to-emerald-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-spin-slow"></div>
            <div class="absolute bottom-[10%] right-[10%] w-72 h-72 bg-gradient-to-r from-teal-400 to-green-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-spin-slow" style="animation-direction: reverse;"></div>
        </div>
    </div>

    <!-- App Container -->
    <div id="app-container" class="hidden flex flex-col h-full w-full transition-opacity duration-300 relative z-10 glass-panel">

        <!-- Header -->
        <header
            class="sticky top-0 bg-white/40 backdrop-blur-2xl z-20 border-b border-white/20 shadow-sm dark:bg-slate-900/50 dark:border-slate-700/50 transition-all duration-300">
            <div class="w-full px-3 sm:px-5 lg:px-8">
                <div class="flex justify-between items-center h-14 sm:h-16">
                    <div class="flex items-center gap-2 min-w-0">
                        <i data-lucide="flower-2" class="text-primary h-7 w-7 sm:h-8 sm:w-8 flex-shrink-0 animate-pulse-slow"></i>
                        <h1 class="text-base sm:text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary via-secondary to-tertiary animate-gradient-x whitespace-nowrap"
                            title="Flowers Management System">
                            FMS
                        </h1>
                    </div>
                    <div class="hidden sm:flex items-center mx-4 flex-1 max-w-md">
                        <div class="relative w-full">
                            <i data-lucide="search"
                                class="absolute left-3 top-1/2 transform -translate-y-1/2 h-4 w-4 text-gray-400"></i>
                            <input type="text" id="global-search-input" onkeyup="handleGlobalSearch(this.value)"
                                placeholder="Search members by name or ID..."
                                class="w-full pl-9 pr-4 py-1.5 text-sm bg-gray-100 dark:bg-gray-700/50 border border-transparent focus:border-primary/50 focus:bg-white dark:focus:bg-gray-800 rounded-full dark:text-white outline-none transition-all placeholder-gray-400">
                        </div>
                    </div>
                    <div class="flex items-center gap-1 sm:gap-3 flex-shrink-0">
                        <button onclick="toggleMobileSearch()"
                            class="sm:hidden p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
                            title="Search">
                            <i data-lucide="search" class="h-5 w-5 text-gray-600 dark:text-gray-300"></i>
                        </button>
                        <button onclick="toggleTheme()"
                            class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
                            title="Toggle Theme">
                            <i data-lucide="moon" class="h-5 w-5 text-gray-600 dark:hidden"></i>
                            <i data-lucide="sun" class="h-5 w-5 text-yellow-400 hidden dark:block"></i>
                        </button>
                        <button onclick="cycleLanguage()" id="lang-btn"
                            class="px-2 py-1 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors flex items-center gap-1 text-xs font-semibold text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-700"
                            title="Change Language">
                            <i data-lucide="globe" class="h-4 w-4"></i>
                            <span id="lang-label">EN</span>
                        </button>
                        <button id="reset-data-btn"
                            class="hidden sm:inline-block text-xs text-red-500 hover:text-red-700 underline whitespace-nowrap">Reset
                            Data</button>
                        <button onclick="logout()" id="logout-btn"
                            class="text-xs sm:text-sm font-medium text-gray-600 dark:text-gray-300 hover:text-primary transition-colors whitespace-nowrap px-2 py-1">Logout</button>
                    </div>
                </div>
                <!-- Mobile Search Bar (Hidden by default) -->
                <div id="mobile-search-container" class="hidden pb-3">
                    <div class="relative w-full">
                        <i data-lucide="search"
                            class="absolute left-3 top-1/2 transform -translate-y-1/2 h-4 w-4 text-gray-400"></i>
                        <input type="text" id="mobile-global-search-input" onkeyup="handleGlobalSearch(this.value)"
                            placeholder="Search members..."
                            class="w-full pl-9 pr-4 py-2 text-sm bg-gray-100 dark:bg-gray-700/50 border border-transparent focus:border-primary/50 focus:bg-white dark:focus:bg-gray-800 rounded-xl dark:text-white outline-none transition-all placeholder-gray-400">
                    </div>
                </div>
            </div>
        </header>

        <!-- Search Results Overlays -->
        <div id="search-results-overlay"
            class="hidden fixed inset-0 z-40 bg-black/20 backdrop-blur-sm mt-[60px] sm:mt-[64px]"
            onclick="closeGlobalSearch()">
            <div class="max-w-2xl mx-auto w-full px-4 sm:px-6 lg:px-8 mt-2">
                <div id="search-results-container"
                    class="bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-gray-100 dark:border-gray-700 overflow-hidden max-h-[60vh] overflow-y-auto">
                </div>
            </div>
        </div>

        <!-- Main Layout -->
        <div class="flex flex-1 overflow-hidden">

            <!-- Sidebar (Desktop only) -->
            <nav id="sidebar-nav"
                class="hidden md:flex flex-col w-52 lg:w-60 bg-white/30 backdrop-blur-xl border-r border-white/20 pt-4 pb-4 dark:bg-slate-900/30 dark:border-slate-700/50 transition-colors duration-500 z-10 flex-shrink-0">
                <div class="flex-1 px-2 space-y-0.5">
                    <button onclick="switchTab('dashboard')"
                        class="nav-item w-full group flex items-center px-3 py-2.5 text-sm font-medium rounded-xl text-gray-600 hover:bg-primary/10 hover:text-primary transition-all duration-200 dark:text-gray-300 dark:hover:bg-gray-700 dark:hover:text-white"
                        data-tab="dashboard">
                        <i data-lucide="bar-chart-2"
                            class="mr-3 h-5 w-5 flex-shrink-0 text-gray-400 group-hover:text-primary dark:text-gray-400 dark:group-hover:text-gray-300"></i>
                        Dashboard
                    </button>
                    <button onclick="switchTab('entries')"
                        class="nav-item w-full group flex items-center px-3 py-2.5 text-sm font-medium rounded-xl text-gray-600 hover:bg-primary/10 hover:text-primary transition-all duration-200 dark:text-gray-300 dark:hover:bg-gray-700 dark:hover:text-white"
                        data-tab="entries">
                        <i data-lucide="pen-tool"
                            class="mr-3 h-5 w-5 flex-shrink-0 text-gray-400 group-hover:text-primary dark:text-gray-400 dark:group-hover:text-gray-300"></i>
                        Daily Entries
                    </button>
                    <button onclick="switchTab('members')"
                        class="nav-item w-full group flex items-center px-3 py-2.5 text-sm font-medium rounded-xl text-gray-600 hover:bg-primary/10 hover:text-primary transition-all duration-200 dark:text-gray-300 dark:hover:bg-gray-700 dark:hover:text-white"
                        data-tab="members">
                        <i data-lucide="users"
                            class="mr-3 h-5 w-5 flex-shrink-0 text-gray-400 group-hover:text-primary dark:text-gray-400 dark:group-hover:text-gray-300"></i>
                        Members
                    </button>
                    <button onclick="switchTab('settings')"
                        class="nav-item w-full group flex items-center px-3 py-2.5 text-sm font-medium rounded-xl text-gray-600 hover:bg-primary/10 hover:text-primary transition-all duration-200 dark:text-gray-300 dark:hover:bg-gray-700 dark:hover:text-white"
                        data-tab="settings">
                        <i data-lucide="settings"
                            class="mr-3 h-5 w-5 flex-shrink-0 text-gray-400 group-hover:text-primary dark:text-gray-400 dark:group-hover:text-gray-300"></i>
                        Settings &amp; Rates
                    </button>
                    <button onclick="switchTab('bills')"
                        class="nav-item w-full group flex items-center px-3 py-2.5 text-sm font-medium rounded-xl text-gray-600 hover:bg-primary/10 hover:text-primary transition-all duration-200 dark:text-gray-300 dark:hover:bg-gray-700 dark:hover:text-white"
                        data-tab="bills">
                        <i data-lucide="file-text"
                            class="mr-3 h-5 w-5 flex-shrink-0 text-gray-400 group-hover:text-primary dark:text-gray-400 dark:group-hover:text-gray-300"></i>
                        Generate Bills
                    </button>
                    <button onclick="switchTab('profile')"
                        class="nav-item w-full group flex items-center px-3 py-2.5 text-sm font-medium rounded-xl text-gray-600 hover:bg-primary/10 hover:text-primary transition-all duration-200 dark:text-gray-300 dark:hover:bg-gray-700 dark:hover:text-white"
                        data-tab="profile">
                        <i data-lucide="user-circle"
                            class="mr-3 h-5 w-5 flex-shrink-0 text-gray-400 group-hover:text-primary dark:text-gray-400 dark:group-hover:text-gray-300"></i>
                        Profile
                    </button>
                </div>
            </nav>

            <!-- Mobile Bottom Nav -->
            <div id="mobile-nav" class="md:hidden fixed bottom-0 left-0 right-0 bg-white/70 backdrop-blur-2xl border-t border-white/20 flex justify-around items-stretch z-50 dark:bg-slate-900/80 dark:border-slate-700/50 transition-colors duration-500 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] dark:shadow-[0_-10px_40px_rgba(0,0,0,0.2)]"
                style="padding-bottom: env(safe-area-inset-bottom, 4px);">
                <button onclick="switchTab('dashboard')"
                    class="nav-item-mobile flex flex-col items-center justify-center flex-1 py-2 text-gray-500 dark:text-gray-400 active:bg-gray-100 dark:active:bg-gray-800 transition-colors"
                    data-tab="dashboard">
                    <i data-lucide="bar-chart-2" class="h-5 w-5"></i>
                    <span class="text-[10px] mt-0.5 font-medium">Dash</span>
                </button>
                <button onclick="switchTab('entries')"
                    class="nav-item-mobile flex flex-col items-center justify-center flex-1 py-2 text-gray-500 dark:text-gray-400 active:bg-gray-100 dark:active:bg-gray-800 transition-colors"
                    data-tab="entries">
                    <i data-lucide="pen-tool" class="h-5 w-5"></i>
                    <span class="text-[10px] mt-0.5 font-medium">Entries</span>
                </button>
                <button onclick="switchTab('members')"
                    class="nav-item-mobile flex flex-col items-center justify-center flex-1 py-2 text-gray-500 dark:text-gray-400 active:bg-gray-100 dark:active:bg-gray-800 transition-colors"
                    data-tab="members">
                    <i data-lucide="users" class="h-5 w-5"></i>
                    <span class="text-[10px] mt-0.5 font-medium">Members</span>
                </button>
                <button onclick="switchTab('settings')"
                    class="nav-item-mobile flex flex-col items-center justify-center flex-1 py-2 text-gray-500 dark:text-gray-400 active:bg-gray-100 dark:active:bg-gray-800 transition-colors"
                    data-tab="settings">
                    <i data-lucide="settings" class="h-5 w-5"></i>
                    <span class="text-[10px] mt-0.5 font-medium">Rates</span>
                </button>
                <button onclick="switchTab('bills')"
                    class="nav-item-mobile flex flex-col items-center justify-center flex-1 py-2 text-gray-500 dark:text-gray-400 active:bg-gray-100 dark:active:bg-gray-800 transition-colors"
                    data-tab="bills">
                    <i data-lucide="file-text" class="h-5 w-5"></i>
                    <span class="text-[10px] mt-0.5 font-medium">Bills</span>
                </button>
                <button onclick="switchTab('profile')"
                    class="nav-item-mobile flex flex-col items-center justify-center flex-1 py-2 text-gray-500 dark:text-gray-400 active:bg-gray-100 dark:active:bg-gray-800 transition-colors"
                    data-tab="profile">
                    <i data-lucide="user-circle" class="h-5 w-5"></i>
                    <span class="text-[10px] mt-0.5 font-medium">Profile</span>
                </button>
            </div>

            <!-- Content Area -->
            <main
                class="flex-1 overflow-y-auto overflow-x-hidden bg-transparent p-3 sm:p-5 md:p-6 lg:p-8 pb-24 md:pb-6 transition-colors duration-500 relative z-10"
                id="main-content">
                <!-- Dynamic Content Injected Here -->
            </main>
        </div>

        <!-- Hidden Printable Area (Off-screen but rendered for html2canvas) -->
        <div id="printable-area" style="position: absolute; left: -9999px; top: 0;" class="bg-white p-8 text-black">
        </div>

        <!-- Modal Container -->
        <div id="modal-overlay"
            class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 transition-opacity duration-300"
            onclick="closeModal(event)">
            <div class="bg-white/90 backdrop-blur-xl dark:bg-slate-800/90 border border-white/20 dark:border-slate-700/50 rounded-3xl shadow-soft w-full max-w-md mx-4 transform scale-95 transition-transform duration-300"
                onclick="event.stopPropagation()">
                <!-- Modal Header -->
                <div class="flex justify-between items-center p-4 border-b border-gray-200 dark:border-gray-700">
                    <h3 id="modal-title" class="text-lg font-semibold text-gray-900 dark:text-white">Edit Member</h3>
                    <button onclick="closeModal()"
                        class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">
                        <i data-lucide="x" class="h-5 w-5"></i>
                    </button>
                </div>
                <!-- Modal Body -->
                <div id="modal-body" class="p-4 space-y-4">
                    <!-- Content injected via JS -->
                </div>
                <!-- Modal Footer -->
                <div class="flex justify-end gap-2 p-4 border-t border-gray-200 dark:border-gray-700">
                    <button onclick="closeModal()"
                        class="px-6 py-2.5 bg-gray-100/80 text-gray-700 font-medium rounded-xl hover:bg-gray-200 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600 transition-colors">Cancel</button>
                    <button id="modal-save-btn"
                        class="px-6 py-2.5 bg-gradient-to-r from-primary to-secondary text-white font-medium rounded-xl hover:opacity-90 transition-all hover:scale-[1.02] shadow-[0_0_15px_rgba(74,222,128,0.4)]">Save</button>
                </div>
            </div>
        </div>

    </div> <!-- End App Container -->

    <!-- Application Logic -->
    <script src="script.js"></script>
</body>

</html>
